[tips-and-tricks-item-description]
gleban-biospheres=The Gleban Biospheres are a series of biodomes located in the subterranean world of Gleba. They are home to a variety of unique flora, and are a key location for scientific research and exploration. The cyclic growth and decay of fungal and bacterial life within the biospheres creates a dynamic ecosystem that is both fascinating and challenging to study. The biospheres are also a source of valuable resources, such as the compression-resistant fungi, expansion-resistant fungi, cold-resistant bacteria, and heat-resistant bacteria, which can be harvested and utilized for various purposes. Exploring the Gleban Biospheres can yield insights into the complex interactions between different forms of life and the unique environmental conditions of Gleba.\n\nFungal plant harvesting leaves behind mycellium, which can block further growth if left unchecked. The root clearer is a specialized tool designed to remove mycellium and clear the way for new growth, ensuring that the ecosystem remains balanced and productive. Bacteria can also eat the mycellium as part of their natural life cycle.\n\nFinding a balance between growing fungi, consuming mycellium with baterial growth, and clearing mycellium with the root clearer is key to maintaining a healthy and thriving ecosystem within the Gleban Biospheres.\n\nThe biospheres' science pack unlocks access to packaging and freezing technologies, which will help transport items long distances in bulk and without fully spoiling.

