[tips-and-tricks-item-description]
vulcanus-lava-tubes=The Vulcanus Lava Tubes are a network of underground tunnels filled with lava. The lava is rich in aeroluminite and titanium, which can be extracted using specialized filters. The tubes are also home to infant demolishers, so be prepared for a fight if you want to explore them. Infant demolishers will burst from under the ground and attack anything that comes near, but once territory is claimed, they will not attack from below any more. Only direct attacks from the surface continue at that point.\n\nTerritory can be claimed by building a structure on the surface. The structure will claim a small amount of territory, so each new structure has a chance to cause another attack.

