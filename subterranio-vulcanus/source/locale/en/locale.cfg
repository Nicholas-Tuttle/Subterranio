[tips-and-tricks-item-description]
vulcanus-lava-tubes=The Vulcanus Lava Tubes are a network of underground tunnels filled with lava. The lava is rich in aeroluminite and duratitanite, which can be extracted using specialized filters. The tubes are also home to infant demolishers, so be prepared for a fight if you want to explore them. Infant demolishers will burst from under the ground and attack anything that comes near, but once territory is claimed, they will not attack from below any more. Only direct attacks from the surface continue at that point.\n\nTerritory can be claimed by building a structure on the surface. The structure will claim a small amount of territory. If a structure is destroyed by an enemy, territory will not be lost. If it is removed by a player territory can be lost. Some buildings will need to be sacrificed in order to gain ground over the infant demolishers.\n\nThere will also be consistent infant demolishers patrolling the general area, so be prepared for occasional encounters even after claiming territory. The lava tubes are a dangerous place, but the resources within are worth the risk.

[tips-and-tricks-item-name]
vulcanus-lava-tubes=Vulcanus Lava Tubes
